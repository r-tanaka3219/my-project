<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>パスワード変更 - 在庫管理システム</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Meiryo','Hiragino Sans',sans-serif;background:#0f172a;min-height:100vh;display:flex;align-items:center;justify-content:center}
.wrap{width:100%;max-width:420px;padding:20px}
.card{background:#fff;border-radius:14px;box-shadow:0 8px 40px rgba(0,0,0,.35);padding:40px 36px}
.logo{text-align:center;margin-bottom:24px}
.logo-icon{font-size:48px;line-height:1}
.logo-title{font-size:18px;font-weight:bold;color:#1e3a5f;margin-top:10px}
.notice{background:#fef3c7;border:1px solid #f59e0b;border-radius:8px;padding:12px 14px;margin-bottom:20px;font-size:13px;color:#92400e;line-height:1.6}
.form-group{margin-bottom:16px}
label{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:4px}
input[type=password]{width:100%;padding:10px 12px;border:1.5px solid #d1d5db;border-radius:8px;font-size:14px;font-family:inherit;color:#1e2d3d;transition:border-color .15s}
input[type=password]:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.hint{font-size:11px;color:#6b7280;margin-top:4px}
.btn{width:100%;padding:11px;border:none;border-radius:8px;background:#1e3a8a;color:#fff;font-size:15px;font-weight:bold;font-family:inherit;cursor:pointer;transition:background .15s;margin-top:6px}
.btn:hover{background:#1d4ed8}
.flash{padding:9px 12px;border-radius:7px;margin-bottom:16px;font-size:13px}
.flash-danger{background:#fee2e2;color:#991b1b;border:1px solid #fecaca}
.flash-warning{background:#fef9c3;color:#854d0e;border:1px solid #fde68a}
.flash-success{background:#dcfce7;color:#166534;border:1px solid #bbf7d0}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🔑</div>
      <div class="logo-title">パスワードの変更が必要です</div>
    </div>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
      <div class="flash flash-{{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    <div class="notice">
      初期パスワードのままではご利用いただけません。<br>
      新しいパスワードを設定してください。
    </div>
    <form method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label>新しいパスワード</label>
        <input type="password" name="password" placeholder="8文字以上" autofocus autocomplete="new-password">
        <div class="hint">8文字以上。初期パスワード（admin123 / user123）は使用不可。</div>
      </div>
      <div class="form-group">
        <label>新しいパスワード（確認）</label>
        <input type="password" name="password2" placeholder="もう一度入力" autocomplete="new-password">
      </div>
      <button type="submit" class="btn">パスワードを変更する</button>
    </form>
  </div>
</div>
</body>
</html>
