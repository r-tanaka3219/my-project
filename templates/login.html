<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ログイン - 在庫管理システム</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Meiryo','Hiragino Sans',sans-serif;background:#0f172a;min-height:100vh;display:flex;align-items:center;justify-content:center}
.wrap{width:100%;max-width:400px;padding:20px}
.card{background:#fff;border-radius:14px;box-shadow:0 8px 40px rgba(0,0,0,.35);padding:40px 36px}
.logo{text-align:center;margin-bottom:28px}
.logo-icon{font-size:48px;line-height:1}
.logo-title{font-size:20px;font-weight:bold;color:#1e3a5f;margin-top:10px}
.logo-sub{font-size:12px;color:#6b7280;margin-top:4px}
.form-group{margin-bottom:16px}
label{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:4px}
input{width:100%;padding:10px 12px;border:1.5px solid #d1d5db;border-radius:8px;font-size:14px;font-family:inherit;color:#1e2d3d;transition:border-color .15s}
input:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.btn{width:100%;padding:11px;border:none;border-radius:8px;background:#1e3a8a;color:#fff;font-size:15px;font-weight:bold;font-family:inherit;cursor:pointer;transition:background .15s;margin-top:6px}
.btn:hover{background:#1d4ed8}
.flash{padding:9px 12px;border-radius:7px;margin-bottom:16px;font-size:13px}
.flash-danger{background:#fee2e2;color:#991b1b;border:1px solid #fecaca}
.flash-success{background:#dcfce7;color:#166534;border:1px solid #bbf7d0}
.flash-warning{background:#fef9c3;color:#854d0e;border:1px solid #fde68a}
.hint{margin-top:20px;padding:12px;background:#f0f9ff;border-radius:8px;font-size:11px;color:#0369a1;line-height:1.8}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="logo">
      <img src="/static/satofood.png" alt="佐藤食品株式会社" style="max-width:200px;height:auto;margin-bottom:12px">
      <div class="logo-title">在庫管理システム</div>
      <div class="logo-sub">ID・パスワードでログインしてください</div>
    </div>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
      <div class="flash flash-{{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    <form method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label>ユーザーID</label>
        <input type="text" name="username" placeholder="例: admin" autofocus autocomplete="username">
      </div>
      <div class="form-group">
        <label>パスワード</label>
        <input type="password" name="password" placeholder="パスワードを入力" autocomplete="current-password">
      </div>
      <button type="submit" class="btn">ログイン</button>
    </form>
  </div>
</div>
</body>
</html>
