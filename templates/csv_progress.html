<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CSV取込 進捗モニター</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Meiryo','Hiragino Sans',sans-serif;background:#f1f5f9;min-height:100vh;color:#1e293b;padding:32px 16px}
.wrap{max-width:760px;margin:0 auto}

/* ヘッダー */
.page-header{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.page-header h1{font-size:20px;font-weight:700;color:#1e40af}
.spinner{width:22px;height:22px;border:3px solid #bfdbfe;border-top:3px solid #2563eb;border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.status-badge{padding:3px 12px;border-radius:20px;font-size:12px;font-weight:700}
.badge-running{background:#dbeafe;color:#1d4ed8}
.badge-done{background:#dcfce7;color:#166534}
.badge-error{background:#fee2e2;color:#991b1b}

/* カード */
.card{background:#fff;border-radius:12px;padding:24px;margin-bottom:16px;box-shadow:0 1px 6px rgba(0,0,0,.08)}
.card-title{font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.6px;margin-bottom:14px}

/* ファイル名 */
.file-name{font-size:14px;font-weight:600;color:#374151;margin-bottom:14px;word-break:break-all;min-height:20px}

/* プログレスバー */
.pct-row{display:flex;align-items:baseline;gap:8px;margin-bottom:8px}
.pct-num{font-size:28px;font-weight:700;color:#1e40af;line-height:1}
.pct-sub{font-size:13px;color:#94a3b8}
.progress-track{background:#e2e8f0;border-radius:8px;height:14px;overflow:hidden;margin-bottom:16px}
.progress-fill{height:100%;background:linear-gradient(90deg,#2563eb,#60a5fa);border-radius:8px;transition:width .3s ease;width:0%}

/* 統計 */
.stats{display:flex;gap:10px;flex-wrap:wrap}
.stat{flex:1;min-width:80px;background:#f8fafc;border-radius:8px;padding:10px 14px;text-align:center;border:1px solid #e2e8f0}
.stat-num{font-size:22px;font-weight:700}
.stat-label{font-size:11px;color:#94a3b8;margin-top:2px}
.ok{color:#16a34a}.skip{color:#d97706}.err{color:#dc2626}.neutral{color:#475569}

/* ログ */
.log{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:14px;max-height:280px;overflow-y:auto;font-size:12px;line-height:1.9;font-family:monospace}
.log-entry{padding:1px 0;border-bottom:1px solid #f1f5f9}
.log-entry:last-child{border-bottom:none}
.log-ok{color:#16a34a}.log-skip{color:#d97706}.log-err{color:#dc2626}.log-info{color:#2563eb}

/* ボタン */
.done-btn{display:none;margin-top:4px}
.btn{display:inline-block;padding:10px 28px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;text-decoration:none;border:none;font-family:inherit}
.btn-primary{background:#2563eb;color:#fff}
.btn-primary:hover{background:#1d4ed8}
.btn-success{background:#16a34a;color:#fff}
.btn-success:hover{background:#15803d}
</style>
</head>
<body>
<div class="wrap">

  <div class="page-header">
    <div class="spinner" id="spinner"></div>
    <h1>CSV取込 進捗モニター</h1>
    <span class="status-badge badge-running" id="status-badge">処理中</span>
  </div>

  <!-- 現在ファイルの進捗 -->
  <div class="card">
    <div class="card-title">現在のファイル</div>
    <div class="file-name" id="current-file">待機中...</div>

    <div class="pct-row">
      <span class="pct-num" id="pct-num">0%</span>
      <span class="pct-sub" id="pct-sub"></span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill"></div>
    </div>

    <div class="stats">
      <div class="stat"><div class="stat-num ok"      id="cnt-ok">0</div><div class="stat-label">成功</div></div>
      <div class="stat"><div class="stat-num skip"    id="cnt-skip">0</div><div class="stat-label">スキップ</div></div>
      <div class="stat"><div class="stat-num err"     id="cnt-err">0</div><div class="stat-label">エラー</div></div>
      <div class="stat"><div class="stat-num neutral" id="cnt-row">0</div><div class="stat-label">処理行</div></div>
      <div class="stat"><div class="stat-num neutral" id="cnt-total">-</div><div class="stat-label">総行数</div></div>
    </div>
  </div>

  <!-- ログ -->
  <div class="card">
    <div class="card-title">ログ</div>
    <div class="log" id="log"></div>
  </div>

  <div class="done-btn" id="done-btn">
    <a href="/csv" class="btn btn-success">✅ CSV設定画面に戻る</a>
  </div>

</div>

<script>
const jobId = {{ job_id | tojson }};
const es = new EventSource('/csv/progress/' + jobId + '/stream');
const log = document.getElementById('log');
let totalOk = 0, totalSkip = 0, totalErr = 0;

function addLog(msg, cls) {
  const d = document.createElement('div');
  d.className = 'log-entry ' + (cls || '');
  d.textContent = msg;
  log.appendChild(d);
  log.scrollTop = log.scrollHeight;
}

function setProgress(pct, cur, total) {
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('pct-num').textContent = pct + '%';
  if (total > 0) {
    document.getElementById('pct-sub').textContent =
      cur.toLocaleString() + ' / ' + total.toLocaleString() + ' 行';
  }
}

es.onmessage = function(e) {
  const ev = JSON.parse(e.data);

  if (ev.phase === 'start') {
    document.getElementById('current-file').textContent = ev.file;
    document.getElementById('cnt-total').textContent = ev.total > 0 ? ev.total.toLocaleString() : '-';
    setProgress(0, 0, ev.total);
    document.getElementById('cnt-ok').textContent = '0';
    document.getElementById('cnt-skip').textContent = '0';
    document.getElementById('cnt-err').textContent = '0';
    document.getElementById('cnt-row').textContent = '0';
    addLog('📂 開始: ' + ev.file + ' (' + (ev.total > 0 ? ev.total.toLocaleString() + '行' : '行数不明') + ')', 'log-info');
  }

  else if (ev.phase === 'progress') {
    const cur = ev.current || ev.row || 0;
    const pct = ev.total > 0 ? Math.round(cur / ev.total * 100) : 0;
    setProgress(pct, cur, ev.total);
    document.getElementById('cnt-ok').textContent   = (ev.ok   || 0).toLocaleString();
    document.getElementById('cnt-skip').textContent = (ev.skip || 0).toLocaleString();
    document.getElementById('cnt-err').textContent  = (ev.err  || 0).toLocaleString();
    document.getElementById('cnt-row').textContent  = cur.toLocaleString();
  }

  else if (ev.phase === 'done') {
    totalOk   += ev.ok;
    totalSkip += ev.skip;
    totalErr  += ev.err;
    setProgress(100, ev.ok + ev.skip + ev.err, ev.ok + ev.skip + ev.err);
    document.getElementById('cnt-ok').textContent   = ev.ok.toLocaleString();
    document.getElementById('cnt-skip').textContent = ev.skip.toLocaleString();
    document.getElementById('cnt-err').textContent  = ev.err.toLocaleString();
    const cls = ev.err > 0 ? 'log-err' : 'log-ok';
    addLog('✅ 完了: ' + ev.file + ' → ' + ev.detail, cls);
  }

  else if (ev.phase === 'finished') {
    es.close();
    document.getElementById('spinner').style.display = 'none';
    const badge = document.getElementById('status-badge');
    badge.textContent = '完了';
    badge.className = 'status-badge badge-done';
    document.getElementById('done-btn').style.display = 'block';
    addLog('', '');
    addLog('🎉 全処理完了 — 成功 ' + totalOk.toLocaleString() + '行  スキップ ' + totalSkip.toLocaleString() + '行  エラー ' + totalErr.toLocaleString() + '行', 'log-ok');
    if (ev.results) {
      ev.results.forEach(function(r) {
        const cls = r.status === 'ok' ? 'log-ok' : r.status === 'skip' ? 'log-skip' : 'log-err';
        addLog('  [' + r.name + '] ' + r.detail, cls);
      });
    }
  }

  else if (ev.phase === 'timeout') {
    es.close();
    addLog('⚠️ タイムアウト', 'log-err');
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('done-btn').style.display = 'block';
  }
};

es.onerror = function() {
  addLog('接続が切れました', 'log-err');
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('done-btn').style.display = 'block';
};
</script>
</body>
</html>
